<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WorldForge — Story Bible</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0e0b07;
  --bg2:     #161109;
  --bg3:     #201a0e;
  --border:  #3d3020;
  --border2: #6a5035;
  --gold:    #c9973a;
  --gold2:   #f0cc70;
  --gold3:   #fde9a0;
  --cream:   #f0e8d0;
  --body:    #d4c8a8;
  --muted:   #9a8a68;
  --muted2:  #7a6a50;
  --red:     #a03a28;
  --teal:    #2a7070;
  --indigo:  #3a3a8a;
  --green:   #2a7040;
  --r: 6px;
}

html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--body);
  font-family: 'EB Garamond', serif;
  font-size: 17px;
  line-height: 1.75;
}

/* ── Parchment background texture ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(201,151,58,.04) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(201,151,58,.03) 0%, transparent 50%),
    radial-gradient(ellipse at 60% 80%, rgba(120,80,30,.04) 0%, transparent 50%);
}

#app { display: flex; height: 100vh; overflow: hidden; position: relative; z-index: 1; }

/* ══ Sidebar ══════════════════════════════════════════ */
.sidebar {
  width: 256px; min-width: 256px;
  background: linear-gradient(180deg, #120e08 0%, #0e0b06 100%);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
  position: relative;
}

/* Subtle animated shimmer line on sidebar right edge */
.sidebar::after {
  content: '';
  position: absolute; top: 0; right: -1px; bottom: 0; width: 1px;
  background: linear-gradient(180deg,
    transparent 0%,
    rgba(201,151,58,.6) 20%,
    rgba(240,204,112,.9) 50%,
    rgba(201,151,58,.6) 80%,
    transparent 100%);
  animation: shimmer-line 4s ease-in-out infinite;
}
@keyframes shimmer-line {
  0%, 100% { opacity: .3; transform: scaleY(.6) translateY(-20%); }
  50% { opacity: 1; transform: scaleY(1) translateY(0); }
}

.sidebar-logo {
  padding: 22px 18px 16px;
  border-bottom: 1px solid var(--border);
  position: relative; overflow: hidden;
}
/* Animated rune glow behind logo */
.sidebar-logo::before {
  content: '✦';
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-size: 120px; color: rgba(201,151,58,.04);
  animation: rune-pulse 6s ease-in-out infinite;
  pointer-events: none; user-select: none;
}
@keyframes rune-pulse {
  0%, 100% { opacity: .5; transform: translate(-50%,-50%) rotate(0deg) scale(1); }
  50% { opacity: 1; transform: translate(-50%,-50%) rotate(15deg) scale(1.1); }
}

.sidebar-logo h1 {
  font-family: 'Cinzel Decorative', serif;
  font-size: 16px; color: var(--gold2);
  letter-spacing: .06em; line-height: 1.3;
  text-shadow: 0 0 20px rgba(201,151,58,.4), 0 0 40px rgba(201,151,58,.15);
  position: relative;
}
.sidebar-logo p {
  font-size: 11px; color: var(--muted);
  margin-top: 3px; letter-spacing: .12em; text-transform: uppercase;
  position: relative;
}

.sidebar-nav { flex: 1; overflow-y: auto; padding: 10px 0; }

.nav-section {
  padding: 14px 18px 5px;
  font-size: 10px; color: var(--muted2);
  letter-spacing: .16em; text-transform: uppercase;
  font-family: 'Cinzel', serif;
  display: flex; align-items: center; gap: 8px;
}
.nav-section::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--border) 0%, transparent 100%);
}

.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 18px; cursor: pointer;
  transition: background .2s, color .2s, padding-left .2s;
  font-size: 15px; color: var(--body);
  border-left: 2px solid transparent;
  user-select: none; position: relative;
  letter-spacing: .01em;
}
.nav-item:hover {
  background: rgba(201,151,58,.07);
  padding-left: 22px;
  color: var(--cream);
}
.nav-item.active {
  background: rgba(201,151,58,.1);
  border-left-color: var(--gold);
  color: var(--gold2);
  padding-left: 22px;
}
/* Animated sparkle on active nav item */
.nav-item.active::after {
  content: '✦';
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  font-size: 8px; color: var(--gold);
  animation: sparkle 2s ease-in-out infinite;
}
@keyframes sparkle {
  0%, 100% { opacity: .3; transform: translateY(-50%) scale(.8) rotate(0deg); }
  50% { opacity: 1; transform: translateY(-50%) scale(1.2) rotate(180deg); }
}

.nav-count {
  margin-left: auto; font-size: 11px; color: var(--muted);
  background: var(--bg3); border: 1px solid var(--border);
  padding: 1px 7px; border-radius: 20px;
}
.nav-item.active .nav-count { border-color: rgba(201,151,58,.3); color: var(--gold); }

.sidebar-footer {
  padding: 12px 18px;
  border-top: 1px solid var(--border);
  font-size: 12px; color: var(--muted2);
}

/* ══ Main ═════════════════════════════════════════════ */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.topbar {
  height: 56px;
  background: linear-gradient(90deg, #120e08 0%, #161109 100%);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 24px; gap: 14px; flex-shrink: 0;
  position: relative;
}
/* Animated gold line along bottom of topbar */
.topbar::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(201,151,58,.5) 30%,
    rgba(240,204,112,.8) 50%,
    rgba(201,151,58,.5) 70%,
    transparent 100%);
  animation: topbar-glow 5s ease-in-out infinite;
}
@keyframes topbar-glow {
  0%, 100% { opacity: .4; }
  50% { opacity: 1; }
}

.topbar h2 {
  font-family: 'Cinzel', serif;
  font-size: 16px; color: var(--cream);
  flex: 1; letter-spacing: .06em;
  text-shadow: 0 0 30px rgba(201,151,58,.2);
}

.content { flex: 1; overflow-y: auto; padding: 28px; }
.content.no-pad { padding: 0; display: flex; flex-direction: column; }

/* ══ Buttons ══════════════════════════════════════════ */
.btn {
  padding: 8px 16px; border-radius: var(--r);
  border: 1px solid var(--border2);
  background: var(--bg3); color: var(--cream);
  cursor: pointer; font-family: 'EB Garamond', serif;
  font-size: 15px; transition: all .2s; letter-spacing: .02em;
}
.btn:hover { background: var(--border); color: var(--gold2); border-color: var(--gold); }
.btn:disabled { opacity: .35; cursor: not-allowed; }
.btn-gold {
  background: linear-gradient(135deg, #b8822a 0%, var(--gold) 50%, #b8822a 100%);
  background-size: 200% 100%;
  color: #1a0f00; border-color: var(--gold);
  font-weight: 600; font-size: 15px;
  transition: all .3s, background-position .4s;
}
.btn-gold:hover:not(:disabled) {
  background-position: 100% 0;
  box-shadow: 0 0 16px rgba(201,151,58,.4);
  color: #0e0800;
}
.btn-sm { padding: 5px 12px; font-size: 13px; }
.btn-danger { color: #e07060; border-color: var(--red); }
.btn-danger:hover { background: rgba(155,58,42,.15); color: #e07060; border-color: #c06050; }

/* ══ Cards ════════════════════════════════════════════ */
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap: 16px; }
.card {
  background: linear-gradient(135deg, var(--bg2) 0%, #180f08 100%);
  border: 1px solid var(--border); border-radius: var(--r);
  padding: 18px; cursor: pointer;
  transition: border-color .2s, transform .2s, box-shadow .2s;
  position: relative; overflow: hidden;
}
.card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
.card.char::before    { background: linear-gradient(90deg, var(--red), #d05040); }
.card.faction::before { background: linear-gradient(90deg, var(--indigo), #6060c0); }
.card.location::before{ background: linear-gradient(90deg, var(--teal), #40a0a0); }
.card.magic::before   { background: linear-gradient(90deg, #a07020, var(--gold2)); }
.card.history::before { background: linear-gradient(90deg, var(--green), #40a060); }
.card:hover {
  border-color: rgba(201,151,58,.5);
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,.4), 0 0 0 1px rgba(201,151,58,.1);
}
.card h3 { font-family: 'Cinzel', serif; font-size: 15px; color: var(--gold2); margin-bottom: 5px; }
.card-sub { font-size: 12px; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: .08em; }
.card p { font-size: 14px; color: var(--body); line-height: 1.65; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.card-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 12px; }
.tag { padding: 2px 9px; border-radius: 20px; font-size: 12px; background: var(--bg3); border: 1px solid var(--border); color: var(--muted); }

.add-card {
  background: transparent;
  border: 1px dashed var(--border2); border-radius: var(--r);
  padding: 18px; cursor: pointer; color: var(--muted);
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: all .2s; min-height: 130px;
  font-family: 'EB Garamond', serif; font-size: 15px;
}
.add-card:hover { border-color: var(--gold); color: var(--gold2); background: rgba(201,151,58,.04); }

/* ══ Detail Panel ═════════════════════════════════════ */
.detail-panel {
  position: fixed; top: 0; right: 0; bottom: 0; width: 540px;
  background: linear-gradient(180deg, #140f08 0%, #0e0b06 100%);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column; z-index: 100;
  transform: translateX(100%); transition: transform .28s ease;
}
.detail-panel.open { transform: translateX(0); }

/* Animated glow on detail panel left edge */
.detail-panel.open::before {
  content: '';
  position: absolute; top: 0; left: -1px; bottom: 0; width: 1px;
  background: linear-gradient(180deg,
    transparent 0%, rgba(201,151,58,.5) 25%,
    rgba(240,204,112,.8) 50%, rgba(201,151,58,.5) 75%, transparent 100%);
  animation: panel-edge 3s ease-in-out infinite;
}
@keyframes panel-edge {
  0%, 100% { opacity: .5; }
  50% { opacity: 1; }
}

.detail-header {
  padding: 18px 22px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
/* Corner ornament on detail header */
.detail-header::before {
  content: '❧';
  position: absolute; top: 16px; right: 20px;
  font-size: 10px; color: rgba(201,151,58,.25);
  pointer-events: none;
}
.detail-header h2 { font-family: 'Cinzel', serif; font-size: 17px; color: var(--gold2); flex: 1; }
.detail-body { flex: 1; overflow-y: auto; padding: 22px; }
.detail-section { margin-bottom: 20px; }
.detail-label {
  font-size: 11px; color: var(--muted); text-transform: uppercase;
  letter-spacing: .12em; margin-bottom: 6px; font-family: 'Cinzel', serif;
  display: flex; align-items: center; gap: 8px;
}
.detail-label::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--border) 0%, transparent 100%); }
.detail-value { font-size: 15px; color: var(--body); line-height: 1.8; white-space: pre-wrap; }

.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-family: 'Cinzel', serif; letter-spacing: .06em; text-transform: uppercase; }
.badge-char    { background: rgba(155,58,42,.25);   border: 1px solid rgba(160,58,40,.5);  color: #f08070; }
.badge-faction { background: rgba(58,58,122,.25);   border: 1px solid rgba(60,60,140,.5);  color: #9090e0; }
.badge-location{ background: rgba(42,107,107,.25);  border: 1px solid rgba(42,112,112,.5); color: #70d0d0; }
.badge-magic   { background: rgba(201,151,58,.2);   border: 1px solid rgba(201,151,58,.4); color: var(--gold2); }
.badge-history { background: rgba(42,107,58,.25);   border: 1px solid rgba(42,112,60,.5);  color: #70d090; }
.divider {
  border: none; margin: 18px 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--border) 20%, var(--border2) 50%, var(--border) 80%, transparent 100%);
  position: relative;
}
.divider::after {
  content: '✦';
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 8px; color: var(--muted2);
  background: var(--bg2); padding: 0 6px;
}

/* ══ Modal ════════════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.8);
  backdrop-filter: blur(3px);
  z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px;
}
.modal {
  background: linear-gradient(135deg, #161009 0%, #120d07 100%);
  border: 1px solid var(--border2); border-radius: var(--r);
  width: 100%; max-width: 600px; max-height: 90vh;
  display: flex; flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,.7), 0 0 0 1px rgba(201,151,58,.1);
}
.modal-header {
  padding: 18px 22px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
  background: rgba(201,151,58,.04);
}
.modal-header h3 { font-family: 'Cinzel', serif; font-size: 16px; color: var(--gold2); flex: 1; letter-spacing: .04em; }
.modal-body { flex: 1; overflow-y: auto; padding: 22px; }
.modal-footer { padding: 16px 22px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }

/* ══ Forms ════════════════════════════════════════════ */
.form-group { margin-bottom: 16px; }
.form-label {
  display: block; font-size: 11px; color: var(--muted);
  text-transform: uppercase; letter-spacing: .1em;
  margin-bottom: 6px; font-family: 'Cinzel', serif;
}
.form-input, .form-textarea {
  width: 100%; background: rgba(0,0,0,.3);
  border: 1px solid var(--border2);
  border-radius: var(--r); color: var(--cream);
  padding: 9px 13px;
  font-family: 'EB Garamond', serif; font-size: 15px;
  transition: border-color .2s, box-shadow .2s;
  line-height: 1.6;
}
.form-input:focus, .form-textarea:focus {
  outline: none; border-color: var(--gold);
  box-shadow: 0 0 0 2px rgba(201,151,58,.15), 0 0 12px rgba(201,151,58,.1);
}
.form-input::placeholder, .form-textarea::placeholder { color: var(--muted2); }
.form-textarea { min-height: 100px; resize: vertical; }

/* ══ Stats / Dashboard ════════════════════════════════ */
.stats-row { display: grid; grid-template-columns: repeat(5,1fr); gap: 14px; margin-bottom: 28px; }
.stat-card {
  background: linear-gradient(135deg, var(--bg2) 0%, #110c06 100%);
  border: 1px solid var(--border); border-radius: var(--r);
  padding: 18px; text-align: center; cursor: pointer;
  transition: all .2s; position: relative; overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
  background: radial-gradient(circle, rgba(201,151,58,.06) 0%, transparent 60%);
  opacity: 0; transition: opacity .3s;
}
.stat-card:hover { border-color: rgba(201,151,58,.4); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.3); }
.stat-card:hover::before { opacity: 1; }
.stat-num { font-family: 'Cinzel Decorative', serif; font-size: 32px; color: var(--gold2); text-shadow: 0 0 20px rgba(201,151,58,.3); }
.stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-top: 5px; }
.stat-icon { font-size: 24px; margin-bottom: 6px; }
.section-title {
  font-family: 'Cinzel', serif; font-size: 12px; color: var(--muted);
  margin-bottom: 14px; letter-spacing: .1em; text-transform: uppercase;
  display: flex; align-items: center; gap: 10px;
}
.section-title::before, .section-title::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, var(--border));
}
.section-title::after { background: linear-gradient(90deg, var(--border), transparent); }

/* ══ Search ═══════════════════════════════════════════ */
.search-bar {
  width: 100%;
  background: rgba(0,0,0,.3);
  border: 1px solid var(--border2); border-radius: var(--r);
  color: var(--cream); padding: 11px 16px;
  font-family: 'EB Garamond', serif; font-size: 15px;
  margin-bottom: 22px; transition: border-color .2s, box-shadow .2s;
}
.search-bar:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 2px rgba(201,151,58,.1); }
.search-bar::placeholder { color: var(--muted2); }

/* ══ Chat ═════════════════════════════════════════════ */
.chat-wrap { display: flex; flex-direction: column; height: 100%; }
.chat-messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 18px; }
.msg { max-width: 82%; }
.msg.user { align-self: flex-end; }
.msg.assistant { align-self: flex-start; }
.msg-name { font-size: 11px; color: var(--muted); margin-bottom: 5px; font-family: 'Cinzel', serif; letter-spacing: .08em; text-transform: uppercase; }
.msg-bubble { padding: 13px 18px; border-radius: var(--r); font-size: 15px; line-height: 1.8; white-space: pre-wrap; }
.msg.user .msg-bubble {
  background: rgba(201,151,58,.12); color: var(--cream);
  border: 1px solid rgba(201,151,58,.2);
}
.msg.assistant .msg-bubble {
  background: var(--bg3); border: 1px solid var(--border); color: var(--body);
}
.chat-bottom { flex-shrink: 0; }
.chat-suggestions { padding: 10px 22px 2px; display: flex; flex-wrap: wrap; gap: 7px; }
.chip {
  padding: 5px 13px; border-radius: 20px; background: var(--bg3);
  border: 1px solid var(--border2); color: var(--muted); font-size: 13px;
  cursor: pointer; transition: all .2s; font-family: 'EB Garamond', serif;
}
.chip:hover { border-color: var(--gold); color: var(--gold2); background: rgba(201,151,58,.06); }
.chat-input-row { padding: 16px 22px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; }
.chat-input {
  flex: 1; background: rgba(0,0,0,.3); border: 1px solid var(--border2);
  border-radius: var(--r); color: var(--cream); padding: 11px 15px;
  font-family: 'EB Garamond', serif; font-size: 15px; resize: none;
  min-height: 46px; max-height: 150px; transition: border-color .2s, box-shadow .2s;
  line-height: 1.6;
}
.chat-input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 2px rgba(201,151,58,.1); }
.chat-input::placeholder { color: var(--muted2); }
.offline-banner {
  margin: 8px 22px; padding: 9px 14px; border-radius: var(--r);
  background: rgba(58,46,30,.6); border: 1px solid var(--border2);
  font-size: 13px; color: var(--muted); text-align: center;
}

/* ══ AI Provider Toggle ══════════════════════════════ */
.provider-bar { padding: 10px 22px 0; display: flex; align-items: center; gap: 10px; }
.provider-label { font-size: 12px; color: var(--muted); font-family: 'Cinzel', serif; text-transform: uppercase; letter-spacing: .08em; }
.toggle-group { display: flex; border: 1px solid var(--border2); border-radius: var(--r); overflow: hidden; }
.toggle-opt { padding: 5px 13px; font-size: 13px; cursor: pointer; font-family: 'EB Garamond', serif; color: var(--muted); background: var(--bg3); transition: all .2s; border: none; }
.toggle-opt.active { background: var(--gold); color: #1a0f00; font-weight: 600; }
.toggle-opt:hover:not(.active) { color: var(--gold2); background: rgba(201,151,58,.08); }

/* ══ API Key ══════════════════════════════════════════ */
.api-setup {
  background: rgba(0,0,0,.2); border: 1px solid var(--border2);
  border-radius: var(--r); padding: 16px 20px; margin: 10px 22px 0;
}
.api-setup h4 { font-family: 'Cinzel', serif; font-size: 13px; color: var(--gold2); margin-bottom: 7px; }
.api-setup p { font-size: 13px; color: var(--muted); margin-bottom: 11px; line-height: 1.6; }
.api-row { display: flex; gap: 8px; }
.api-row .form-input { flex: 1; font-family: monospace; font-size: 12px; }
.api-saved-row { padding: 6px 22px 0; display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }

/* ══ Consistency ══════════════════════════════════════ */
.issue {
  background: linear-gradient(135deg, var(--bg2) 0%, #100c06 100%);
  border: 1px solid var(--border); border-radius: var(--r);
  padding: 16px 18px; margin-bottom: 12px;
}
.issue.high   { border-left: 3px solid #a03a28; }
.issue.medium { border-left: 3px solid #907020; }
.issue.low    { border-left: 3px solid #2a7040; }
.issue-title { font-family: 'Cinzel', serif; font-size: 14px; color: var(--gold2); margin-bottom: 6px; }
.issue-desc { font-size: 14px; color: var(--body); line-height: 1.7; }
.issue-meta { font-size: 12px; color: var(--muted); margin-top: 8px; text-transform: uppercase; letter-spacing: .08em; }

/* ══ Manuscript Importer ══════════════════════════════ */
.import-zone {
  border: 2px dashed var(--border2); border-radius: var(--r);
  padding: 48px 24px; text-align: center; cursor: pointer;
  transition: border-color .25s, background .25s; margin-bottom: 22px;
  position: relative; overflow: hidden;
}
/* Animated corner runes */
.import-zone::before, .import-zone::after {
  content: '⋆ ✦ ⋆';
  position: absolute; font-size: 12px; color: var(--border2);
  transition: color .25s;
  letter-spacing: 4px;
}
.import-zone::before { top: 10px; left: 50%; transform: translateX(-50%); }
.import-zone::after  { bottom: 10px; left: 50%; transform: translateX(-50%); }
.import-zone:hover::before, .import-zone:hover::after { color: rgba(201,151,58,.4); }
.import-zone:hover, .import-zone.drag-over { border-color: var(--gold); background: rgba(201,151,58,.05); }
.import-zone h3 { font-family: 'Cinzel', serif; font-size: 16px; color: var(--cream); margin-bottom: 8px; }
.import-zone p { font-size: 14px; color: var(--muted); line-height: 1.7; }
.import-icon { font-size: 44px; margin-bottom: 14px; }

.suggestion-list { display: flex; flex-direction: column; gap: 12px; }
.suggestion-item {
  background: linear-gradient(135deg, var(--bg2) 0%, #110c06 100%);
  border: 1px solid var(--border); border-radius: var(--r);
  padding: 16px 18px; position: relative;
  transition: border-color .2s;
}
.suggestion-item:hover { border-color: var(--border2); }
.suggestion-item::before { content:''; position:absolute; top:0; left:0; bottom:0; width:3px; border-radius: var(--r) 0 0 var(--r); }
.suggestion-item.char::before    { background: linear-gradient(180deg, var(--red), #d05040); }
.suggestion-item.faction::before { background: linear-gradient(180deg, var(--indigo), #6060c0); }
.suggestion-item.location::before{ background: linear-gradient(180deg, var(--teal), #40a0a0); }
.suggestion-item.magic::before   { background: linear-gradient(180deg, #a07020, var(--gold2)); }
.suggestion-item.history::before { background: linear-gradient(180deg, var(--green), #40a060); }
.suggestion-item h4 { font-family: 'Cinzel', serif; font-size: 14px; color: var(--gold2); margin-bottom: 6px; }
.suggestion-item p { font-size: 14px; color: var(--body); margin-bottom: 12px; line-height: 1.7; }
.suggestion-item-actions { display: flex; gap: 8px; }
.suggestion-accepted { opacity: .35; pointer-events: none; }
.suggestion-accepted::after {
  content: '✓ Added to Bible'; position: absolute; top: 16px; right: 16px;
  font-size: 12px; color: #60c080; font-family: 'Cinzel', serif; letter-spacing: .04em;
}

/* ══ Empty / Loading ══════════════════════════════════ */
.empty-state { text-align: center; padding: 64px 24px; color: var(--muted); }
.empty-icon { font-size: 52px; margin-bottom: 14px; }
.empty-state h3 { font-family: 'Cinzel', serif; font-size: 18px; color: var(--cream); margin-bottom: 8px; letter-spacing: .04em; }
.empty-state p { font-size: 14px; line-height: 1.8; }
.dots { display: inline-flex; gap: 5px; align-items: center; }
.dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--gold); animation: pulse 1.4s infinite; }
.dots span:nth-child(2) { animation-delay: .2s; }
.dots span:nth-child(3) { animation-delay: .4s; }
@keyframes pulse { 0%,80%,100%{opacity:.2;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }

.confirm-row { display: flex; align-items: center; gap: 10px; }
.confirm-row span { font-size: 14px; color: var(--muted); }

.install-banner {
  background: rgba(201,151,58,.07); border: 1px solid rgba(201,151,58,.25);
  border-radius: var(--r); padding: 11px 16px; margin-bottom: 22px;
  display: flex; align-items: center; gap: 12px; font-size: 14px; color: var(--muted);
}
.install-banner strong { color: var(--gold2); }
.install-banner button { margin-left: auto; }

/* ══ Scrollbar ════════════════════════════════════════ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

/* ══ Page load fade-in ════════════════════════════════ */
@keyframes fade-up {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.content > * { animation: fade-up .3s ease both; }
.card { animation: fade-up .25s ease both; }
.card:nth-child(1) { animation-delay: .04s; }
.card:nth-child(2) { animation-delay: .08s; }
.card:nth-child(3) { animation-delay: .12s; }
.card:nth-child(4) { animation-delay: .16s; }
.card:nth-child(5) { animation-delay: .20s; }
.card:nth-child(6) { animation-delay: .24s; }
</style>
</head>
<body>
<div id="app"></div>
<input type="file" id="file-picker" accept=".txt,.md" style="display:none" />

<script>
// ══════════════════════════════════════════════════════════════
//  WorldForge v2 — Story Bible + Manuscript Importer + AI Toggle
// ══════════════════════════════════════════════════════════════

const ENTITY_TYPES = [
  { id:'char',     label:'Characters',     icon:'⚔️',  color:'#9b3a2a' },
  { id:'faction',  label:'Factions',       icon:'🏰',  color:'#3a3a7a' },
  { id:'location', label:'Locations',      icon:'🗺️',  color:'#2a6b6b' },
  { id:'magic',    label:'Magic Systems',  icon:'✨',  color:'#c9973a' },
  { id:'history',  label:'History & Lore', icon:'📜',  color:'#2a6b3a' },
];

const TYPE_FIELDS = {
  char:     ['Role / Title','Allegiance','Age','Traits','Goals','Secrets'],
  faction:  ['Type','Leader','Headquarters','Ideology','Allies','Enemies'],
  location: ['Region','Climate','Population','Notable Features','Dangers'],
  magic:    ['Source','Rules & Limits','Cost','Practitioners','Artifacts'],
  history:  ['Era / Date','Key Figures','Causes','Consequences','Related Events'],
};

const BADGE = { char:'badge-char', faction:'badge-faction', location:'badge-location', magic:'badge-magic', history:'badge-history' };

const SUGGESTIONS = [
  'What are the key conflicts in my world?',
  'Suggest a character that fits my lore',
  'Draft an opening scene in this world',
  'What plot holes should I watch out for?',
  'How do my factions relate to each other?',
];

// ── Storage ──────────────────────────────────────────────────
const LS = {
  entities:    'worldforge_entities',
  chat:        'worldforge_chat',
  claudeKey:   'worldforge_apikey',
  openaiKey:   'worldforge_openai_key',
  provider:    'worldforge_provider',
};

function load(key, fallback) { try { return JSON.parse(localStorage.getItem(key)) ?? fallback; } catch { return fallback; } }
function save(key, val)      { localStorage.setItem(key, JSON.stringify(val)); }

function uid() { return Math.random().toString(36).slice(2,10); }
function typeMeta(id) { return ENTITY_TYPES.find(t=>t.id===id) || ENTITY_TYPES[0]; }
function isOnline() { return navigator.onLine; }

// ── State ────────────────────────────────────────────────────
const state = {
  nav:                 'dashboard',
  entities:            load(LS.entities, []),
  chat:                load(LS.chat, []),
  provider:            load(LS.provider, 'claude'),   // 'claude' | 'openai'
  claudeKey:           localStorage.getItem(LS.claudeKey) || '',
  openaiKey:           localStorage.getItem(LS.openaiKey) || '',
  claudeKeyDraft:      '',
  openaiKeyDraft:      '',
  detail:              null,
  modal:               null,
  search:              '',
  chatLoading:         false,
  consistencyReport:   null,
  consistencyLoading:  false,
  confirmDelete:       false,
  showInstallBanner:   !window.matchMedia('(display-mode: standalone)').matches,
  // Manuscript
  manuscriptSuggestions: null,
  manuscriptLoading:   false,
  acceptedSuggestions: new Set(),
};

// ── Render ───────────────────────────────────────────────────
function render() {
  document.getElementById('app').innerHTML = buildApp();
  bindEvents();
}

function buildApp() {
  return `
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1>WorldForge</h1>
      <p>Story Bible</p>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Overview</div>
      ${navItem('dashboard','🏠','Dashboard')}
      ${navItem('chat','💬','Lore Oracle')}
      ${navItem('manuscript','📄','Import Manuscript')}
      ${navItem('consistency','🔍','Consistency')}
      <div class="nav-section">Story Bible</div>
      ${ENTITY_TYPES.map(t=>navItem(t.id, t.icon, t.label, state.entities.filter(e=>e.type===t.id).length)).join('')}
    </nav>
    <div class="sidebar-footer">
      ${state.entities.length} entr${state.entities.length===1?'y':'ies'} · ${state.provider==='claude'?'Claude':'GPT-4o'}
    </div>
  </aside>
  <main class="main">
    ${buildTopbar()}
    <div class="content${(state.nav==='chat'||state.nav==='manuscript')?' no-pad':''}">
      ${buildContent()}
    </div>
  </main>
  ${buildDetailPanel()}
  ${state.modal ? buildModal() : ''}
  `;
}

function navItem(id, icon, label, count) {
  const active = state.nav===id ? ' active':'';
  const badge = count !== undefined ? `<span class="nav-count">${count}</span>` : '';
  return `<div class="nav-item${active}" data-nav="${id}">${icon} ${label}${badge}</div>`;
}

function buildTopbar() {
  const t = ENTITY_TYPES.find(t=>t.id===state.nav);
  const titles = { dashboard:'Dashboard', chat:'Lore Oracle', consistency:'Consistency Check', manuscript:'Import Manuscript' };
  const title = titles[state.nav] || t?.label || '';

  let actions = '';
  if (t)                         actions = `<button class="btn btn-gold btn-sm" id="btn-add">+ Add Entry</button>`;
  if (state.nav==='consistency') actions = `<button class="btn btn-gold btn-sm" id="btn-check" ${state.consistencyLoading?'disabled':''}>
    ${state.consistencyLoading ? 'Analysing…' : 'Run Check'}</button>`;

  return `<div class="topbar"><h2>${title}</h2><div>${actions}</div></div>`;
}

function buildContent() {
  if (state.nav==='dashboard')   return buildDashboard();
  if (state.nav==='chat')        return buildChat();
  if (state.nav==='consistency') return buildConsistency();
  if (state.nav==='manuscript')  return buildManuscript();
  const t = ENTITY_TYPES.find(t=>t.id===state.nav);
  if (t) return buildEntityList(t);
  return '';
}

// ── Dashboard ────────────────────────────────────────────────
function buildDashboard() {
  const installBanner = state.showInstallBanner ? `
    <div class="install-banner">
      <span>💡 <strong>Install as app:</strong> Edge/Chrome → Menu → Apps → "Install this site as an app"</span>
      <button class="btn btn-sm" id="btn-dismiss-install">✕</button>
    </div>` : '';

  const stats = ENTITY_TYPES.map(t=>`
    <div class="stat-card" data-nav="${t.id}">
      <div class="stat-icon">${t.icon}</div>
      <div class="stat-num">${state.entities.filter(e=>e.type===t.id).length}</div>
      <div class="stat-label">${t.label}</div>
    </div>`).join('');

  const recent = [...state.entities].sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0)).slice(0,6);
  const recentHtml = recent.length > 0
    ? `<div class="section-title">Recently Updated</div><div class="card-grid">${recent.map(entityCard).join('')}</div>`
    : `<div class="empty-state"><div class="empty-icon">📖</div><h3>Your world awaits</h3><p>Use the sidebar to start adding entries,<br>or import your manuscript to get started fast.</p></div>`;

  return `${installBanner}<div class="stats-row">${stats}</div>${recentHtml}`;
}

// ── Entity List ──────────────────────────────────────────────
function buildEntityList(t) {
  const filtered = state.entities.filter(e => e.type===t.id && (
    !state.search ||
    e.name.toLowerCase().includes(state.search.toLowerCase()) ||
    (e.description||'').toLowerCase().includes(state.search.toLowerCase())
  ));
  return `
    <input class="search-bar" id="search-input" placeholder="Search ${t.label.toLowerCase()}…" value="${escHtml(state.search)}" />
    <div class="card-grid">
      ${filtered.map(entityCard).join('')}
      <div class="add-card" id="btn-add">＋ Add ${t.label.replace(/s$/,'')}</div>
    </div>
    ${filtered.length===0 && state.search ? `<p style="color:var(--muted);font-size:13px;margin-top:10px">No results for "${escHtml(state.search)}"</p>` : ''}`;
}

function entityCard(e) {
  const t = typeMeta(e.type);
  const tags = (e.tags||[]).slice(0,4).map(tag=>`<span class="tag">${escHtml(tag)}</span>`).join('');
  return `<div class="card ${e.type}" data-entity="${e.id}">
    <h3>${escHtml(e.name)}</h3>
    <div class="card-sub">${t.label}</div>
    ${e.description ? `<p>${escHtml(e.description)}</p>` : ''}
    ${tags ? `<div class="card-tags">${tags}</div>` : ''}
  </div>`;
}

// ── Detail Panel ─────────────────────────────────────────────
function buildDetailPanel() {
  if (!state.detail) return `<div class="detail-panel"></div>`;
  const e = state.detail;
  const t = typeMeta(e.type);
  const fields = (TYPE_FIELDS[e.type]||[]).filter(f=>e.fields?.[f]).map(f=>`
    <div class="detail-section">
      <div class="detail-label">${f}</div>
      <div class="detail-value">${escHtml(e.fields[f])}</div>
    </div>`).join('');
  const tags = (e.tags||[]).map(tag=>`<span class="tag">${escHtml(tag)}</span>`).join('');
  const deleteRow = state.confirmDelete
    ? `<div class="confirm-row"><span>Are you sure?</span><button class="btn btn-sm btn-danger" id="btn-confirm-delete">Yes, delete</button><button class="btn btn-sm" id="btn-cancel-delete">Cancel</button></div>`
    : `<button class="btn btn-sm btn-danger" id="btn-delete">Delete Entry</button>`;

  return `<div class="detail-panel open">
    <div class="detail-header">
      <span style="font-size:20px">${t.icon}</span>
      <h2>${escHtml(e.name)}</h2>
      <button class="btn btn-sm" id="btn-edit">Edit</button>
      <button class="btn btn-sm" id="btn-close-detail" style="margin-left:4px">✕</button>
    </div>
    <div class="detail-body">
      <span class="badge ${BADGE[e.type]}">${t.label}</span>
      ${tags ? `<div class="card-tags" style="margin-top:10px">${tags}</div>` : ''}
      ${e.description ? `<div class="detail-section" style="margin-top:16px"><div class="detail-label">Description</div><div class="detail-value">${escHtml(e.description)}</div></div>` : ''}
      ${fields ? `<hr class="divider">${fields}` : ''}
      ${e.notes ? `<hr class="divider"><div class="detail-section"><div class="detail-label">Notes</div><div class="detail-value">${escHtml(e.notes)}</div></div>` : ''}
      <hr class="divider">${deleteRow}
    </div>
  </div>`;
}

// ── Modal ─────────────────────────────────────────────────────
function buildModal() {
  const { mode, type, entity } = state.modal;
  const t = typeMeta(type);
  const v = f => entity?.fields?.[f] ? escHtml(entity.fields[f]) : '';
  const fieldRows = (TYPE_FIELDS[type]||[]).map(f=>`
    <div class="form-group">
      <label class="form-label">${f}</label>
      <input class="form-input" data-field="${escHtml(f)}" value="${v(f)}" placeholder="${f}…" />
    </div>`).join('');

  return `<div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <span>${t.icon}</span>
        <h3>${mode==='edit'?'Edit':'New'} ${t.label.replace(/s$/,'')}</h3>
        <button class="btn btn-sm" id="btn-modal-close" style="margin-left:auto">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Name *</label>
          <input class="form-input" id="field-name" value="${entity?escHtml(entity.name):''}" placeholder="${t.label.replace(/s$/,'')} name…" />
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea class="form-textarea" id="field-desc" placeholder="Brief overview…">${entity?escHtml(entity.description||''):''}</textarea>
        </div>
        ${fieldRows ? `<hr class="divider">${fieldRows}` : ''}
        <hr class="divider">
        <div class="form-group">
          <label class="form-label">Tags (comma-separated)</label>
          <input class="form-input" id="field-tags" value="${entity?(entity.tags||[]).join(', '):''}" placeholder="protagonist, mage, exiled…" />
        </div>
        <div class="form-group">
          <label class="form-label">Private Notes</label>
          <textarea class="form-textarea" id="field-notes" style="min-height:70px" placeholder="Author notes, plot hooks, future ideas…">${entity?escHtml(entity.notes||''):''}</textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" id="btn-modal-cancel">Cancel</button>
        <button class="btn btn-gold" id="btn-modal-save">${mode==='edit'?'Save Changes':'Add Entry'}</button>
      </div>
    </div>
  </div>`;
}

// ── Chat ─────────────────────────────────────────────────────
function buildChat() {
  const currentKey = state.provider==='claude' ? state.claudeKey : state.openaiKey;
  const keyDraft   = state.provider==='claude' ? state.claudeKeyDraft : state.openaiKeyDraft;
  const keyHint    = state.provider==='claude'
    ? 'Get a key at <strong>console.anthropic.com</strong>'
    : 'Get a key at <strong>platform.openai.com</strong>';
  const keyPlaceholder = state.provider==='claude' ? 'sk-ant-…' : 'sk-…';

  const msgs = state.chat.map(m=>`
    <div class="msg ${m.role}">
      <div class="msg-name">${m.role==='user'?'You':'Lore Oracle'}</div>
      <div class="msg-bubble">${escHtml(m.content)}</div>
    </div>`).join('');

  const loadingMsg = state.chatLoading ? `
    <div class="msg assistant">
      <div class="msg-name">Lore Oracle</div>
      <div class="msg-bubble"><div class="dots"><span></span><span></span><span></span></div></div>
    </div>` : '';

  const empty = state.chat.length===0 ? `
    <div class="empty-state" style="padding-top:30px">
      <div class="empty-icon">🔮</div>
      <h3>The Lore Oracle awaits</h3>
      <p>Ask anything about your world. The Oracle reads your entire<br>story bible before every response.</p>
    </div>` : '';

  const chips = state.chat.length===0 ? `
    <div class="chat-suggestions">
      ${SUGGESTIONS.map(s=>`<div class="chip" data-suggest="${escHtml(s)}">${escHtml(s)}</div>`).join('')}
    </div>` : '';

  const offlineBanner = !isOnline()
    ? `<div class="offline-banner">⚡ You're offline — AI features need an internet connection. Your bible is fully available.</div>` : '';

  const providerToggle = `
    <div class="provider-bar">
      <span class="provider-label">AI Model:</span>
      <div class="toggle-group">
        <button class="toggle-opt ${state.provider==='claude'?'active':''}" data-provider="claude">Claude</button>
        <button class="toggle-opt ${state.provider==='openai'?'active':''}" data-provider="openai">GPT-4o</button>
      </div>
      ${currentKey ? `<span style="font-size:11px;color:var(--muted)">🔑 Key saved</span><button class="btn btn-sm" id="btn-clear-key" style="font-size:11px;padding:2px 8px">Change</button>` : ''}
    </div>`;

  const apiSection = !currentKey ? `
    <div class="api-setup">
      <h4>🔑 ${state.provider==='claude'?'Anthropic':'OpenAI'} API Key Required</h4>
      <p>Stored locally on your device only. Never sent anywhere except the AI provider's servers.</p>
      <div class="api-row">
        <input class="form-input" id="api-key-input" type="password" placeholder="${keyPlaceholder}" value="${escHtml(keyDraft)}" />
        <button class="btn btn-gold btn-sm" id="btn-save-api-key">Save</button>
      </div>
      <p style="margin-top:8px;font-size:11px">${keyHint}</p>
    </div>` : '';

  return `<div class="chat-wrap">
    <div class="chat-messages" id="chat-messages">${empty}${msgs}${loadingMsg}</div>
    <div class="chat-bottom">
      ${chips}
      ${offlineBanner}
      ${providerToggle}
      ${apiSection}
      <div class="chat-input-row">
        <textarea class="chat-input" id="chat-input" placeholder="Ask the Oracle anything about your world…" rows="1"></textarea>
        <button class="btn btn-gold" id="btn-send" ${state.chatLoading||!isOnline()?'disabled':''}>Send</button>
      </div>
    </div>
  </div>`;
}

// ── Manuscript Importer ──────────────────────────────────────
function buildManuscript() {
  if (state.manuscriptLoading) {
    const { chunksDone=0, chunksTotal=1 } = state.manuscriptProgress || {};
    const pct = chunksTotal > 1 ? Math.round((chunksDone/chunksTotal)*100) : null;
    return `
    <div style="padding:24px">
      <div class="empty-state">
        <div class="dots" style="margin-bottom:16px;justify-content:center"><span></span><span></span><span></span></div>
        <h3>Reading your manuscript…</h3>
        <p>The Oracle is scanning every page for characters, factions,<br>locations, magic systems, and historical events.</p>
        ${chunksTotal > 1 ? `
          <div style="margin-top:20px;max-width:320px;margin-left:auto;margin-right:auto">
            <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px">
              <span>Section ${chunksDone} of ${chunksTotal}</span><span>${pct}%</span>
            </div>
            <div style="background:var(--bg3);border-radius:20px;height:6px;overflow:hidden;border:1px solid var(--border2)">
              <div style="background:var(--gold);height:100%;width:${pct}%;transition:width .4s;border-radius:20px"></div>
            </div>
            <p style="font-size:12px;color:var(--muted);margin-top:8px">Processing large manuscripts in sections — please keep this tab open.</p>
          </div>` : ''}
      </div>
    </div>`;
  }

  if (state.manuscriptSuggestions && state.manuscriptSuggestions.length > 0) {
    const items = state.manuscriptSuggestions.map((s, i) => {
      const accepted = state.acceptedSuggestions.has(i);
      const t = typeMeta(s.type);
      return `<div class="suggestion-item ${s.type} ${accepted?'suggestion-accepted':''}">
        <h4>${escHtml(s.name)} <span style="font-size:11px;color:var(--muted);font-family:'EB Garamond',serif;font-weight:normal">· ${t.label.replace(/s$/,'')}</span></h4>
        <p>${escHtml(s.description)}</p>
        <div class="suggestion-item-actions">
          ${!accepted
            ? `<button class="btn btn-gold btn-sm" data-accept="${i}">+ Add to Bible</button>
               <button class="btn btn-sm" data-dismiss="${i}">Dismiss</button>`
            : ''}
        </div>
      </div>`;
    }).join('');

    const total = state.manuscriptSuggestions.length;
    const remaining = state.manuscriptSuggestions.filter((_,i)=>!state.acceptedSuggestions.has(i)).length;
    const allDone = remaining === 0;

    return `<div style="padding:24px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap">
        <div style="flex:1">
          <div class="section-title">Suggested Entries from Manuscript</div>
          <p style="font-size:13px;color:var(--muted)">${total} suggestion${total!==1?'s':''} found · ${remaining} remaining</p>
        </div>
        ${!allDone ? `<button class="btn btn-gold btn-sm" id="btn-accept-all">✓ Accept All</button>` : ''}
        <button class="btn btn-sm" id="btn-new-import">↑ Import Another</button>
      </div>
      <div class="suggestion-list">${items}</div>
    </div>`;
  }

  if (state.manuscriptSuggestions && state.manuscriptSuggestions.length === 0) {
    return `<div style="padding:24px">
      <div class="empty-state">
        <div class="empty-icon">🤔</div>
        <h3>Nothing found</h3>
        <p>The Oracle couldn't identify clear entries from this text.<br>Try a longer excerpt or a different section of your manuscript.</p>
      </div>
      <div style="text-align:center;margin-top:16px">
        <button class="btn btn-gold" id="btn-new-import">Try Another File</button>
      </div>
    </div>`;
  }

  const hasKey = state.provider==='claude' ? !!state.claudeKey : !!state.openaiKey;

  return `<div style="padding:24px;height:100%;overflow-y:auto">
    <div class="import-zone" id="import-zone">
      <div class="import-icon">📄</div>
      <h3>Drop your manuscript here</h3>
      <p>Or click to browse · Accepts .txt or .md files</p>
      <p style="margin-top:8px;font-size:12px">The Oracle will scan for characters, factions, locations, magic systems, and historical events — then suggest entries for your bible.</p>
    </div>
    ${!hasKey ? `<div style="background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:14px 16px;font-size:13px;color:var(--muted)">
      ⚠️ You need an API key saved in the <strong style="color:var(--cream)">Lore Oracle</strong> tab before importing a manuscript.
    </div>` : ''}
    ${!isOnline() ? `<div class="offline-banner" style="margin:0">⚡ Manuscript analysis requires an internet connection.</div>` : ''}
  </div>`;
}

// ── Event Binding ────────────────────────────────────────────
function bindEvents() {
  // Nav
  document.querySelectorAll('[data-nav]').forEach(el => {
    el.addEventListener('click', () => { state.nav=el.dataset.nav; state.search=''; state.confirmDelete=false; render(); });
  });

  // Entity cards & stat cards
  document.querySelectorAll('[data-entity]').forEach(el => {
    el.addEventListener('click', () => {
      const e = state.entities.find(x=>x.id===el.dataset.entity);
      if (e) { state.detail=e; state.confirmDelete=false; render(); }
    });
  });
  document.querySelectorAll('.stat-card[data-nav]').forEach(el => {
    el.addEventListener('click', () => { state.nav=el.dataset.nav; render(); });
  });

  // Add button
  const btnAdd = document.getElementById('btn-add');
  if (btnAdd) btnAdd.addEventListener('click', () => {
    state.modal = { mode:'add', type: ENTITY_TYPES.find(t=>t.id===state.nav)?.id || 'char' };
    render();
  });

  // Search
  const si = document.getElementById('search-input');
  if (si) { si.addEventListener('input', e => { state.search=e.target.value; render(); }); si.focus(); }

  // Detail panel
  document.getElementById('btn-close-detail')?.addEventListener('click', () => { state.detail=null; render(); });
  document.getElementById('btn-edit')?.addEventListener('click', () => {
    state.modal = { mode:'edit', type:state.detail.type, entity:state.detail }; render();
  });
  document.getElementById('btn-delete')?.addEventListener('click', () => { state.confirmDelete=true; render(); });
  document.getElementById('btn-confirm-delete')?.addEventListener('click', () => {
    state.entities = state.entities.filter(e=>e.id!==state.detail.id);
    save(LS.entities, state.entities);
    state.detail=null; state.confirmDelete=false; render();
  });
  document.getElementById('btn-cancel-delete')?.addEventListener('click', () => { state.confirmDelete=false; render(); });

  // Modal
  document.getElementById('modal-overlay')?.addEventListener('click', e => { if(e.target.id==='modal-overlay'){state.modal=null;render();} });
  document.getElementById('btn-modal-close')?.addEventListener('click', () => { state.modal=null; render(); });
  document.getElementById('btn-modal-cancel')?.addEventListener('click', () => { state.modal=null; render(); });
  document.getElementById('btn-modal-save')?.addEventListener('click', () => {
    const name = document.getElementById('field-name')?.value.trim();
    if (!name) { document.getElementById('field-name')?.focus(); return; }
    const fields = {};
    document.querySelectorAll('[data-field]').forEach(el => { if(el.value.trim()) fields[el.dataset.field]=el.value.trim(); });
    const entity = {
      id: state.modal.mode==='edit' ? state.modal.entity.id : uid(),
      type: state.modal.type, name,
      description: document.getElementById('field-desc')?.value.trim()||'',
      fields,
      tags: document.getElementById('field-tags')?.value.split(',').map(t=>t.trim()).filter(Boolean)||[],
      notes: document.getElementById('field-notes')?.value.trim()||'',
      updatedAt: Date.now(),
      createdAt: state.modal.mode==='edit' ? (state.modal.entity.createdAt||Date.now()) : Date.now(),
    };
    state.entities = [...state.entities.filter(e=>e.id!==entity.id), entity];
    save(LS.entities, state.entities);
    state.detail=entity; state.modal=null; render();
  });

  // Provider toggle
  document.querySelectorAll('[data-provider]').forEach(el => {
    el.addEventListener('click', () => { state.provider=el.dataset.provider; save(LS.provider, state.provider); render(); });
  });

  // API keys
  document.getElementById('btn-save-api-key')?.addEventListener('click', () => {
    const val = document.getElementById('api-key-input')?.value.trim();
    if (!val) return;
    if (state.provider==='claude') { state.claudeKey=val; localStorage.setItem(LS.claudeKey, val); }
    else                           { state.openaiKey=val; localStorage.setItem(LS.openaiKey, val); }
    render();
  });
  document.getElementById('api-key-input')?.addEventListener('input', e => {
    if (state.provider==='claude') state.claudeKeyDraft=e.target.value;
    else state.openaiKeyDraft=e.target.value;
  });
  document.getElementById('api-key-input')?.addEventListener('keydown', e => {
    if (e.key==='Enter') document.getElementById('btn-save-api-key')?.click();
  });
  document.getElementById('btn-clear-key')?.addEventListener('click', () => {
    if (state.provider==='claude') { state.claudeKey=''; localStorage.removeItem(LS.claudeKey); state.claudeKeyDraft=''; }
    else                           { state.openaiKey=''; localStorage.removeItem(LS.openaiKey); state.openaiKeyDraft=''; }
    render();
  });

  // Chat
  const chatInput = document.getElementById('chat-input');
  if (chatInput) {
    chatInput.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();} });
    chatInput.addEventListener('input', () => { chatInput.style.height='auto'; chatInput.style.height=Math.min(chatInput.scrollHeight,150)+'px'; });
  }
  document.getElementById('btn-send')?.addEventListener('click', sendChat);
  document.querySelectorAll('[data-suggest]').forEach(el => {
    el.addEventListener('click', () => sendChat(el.dataset.suggest));
  });

  // Consistency
  document.getElementById('btn-check')?.addEventListener('click', runConsistencyCheck);

  // Manuscript
  const importZone = document.getElementById('import-zone');
  if (importZone) {
    importZone.addEventListener('click', () => document.getElementById('file-picker').click());
    importZone.addEventListener('dragover', e => { e.preventDefault(); importZone.classList.add('drag-over'); });
    importZone.addEventListener('dragleave', () => importZone.classList.remove('drag-over'));
    importZone.addEventListener('drop', e => { e.preventDefault(); importZone.classList.remove('drag-over'); handleFile(e.dataTransfer.files[0]); });
  }
  document.getElementById('btn-new-import')?.addEventListener('click', () => {
    state.manuscriptSuggestions=null; state.acceptedSuggestions=new Set(); state.manuscriptProgress=null; render();
  });
  document.getElementById('file-picker').onchange = e => { if(e.target.files[0]) handleFile(e.target.files[0]); e.target.value=''; };

  // Batch accept all remaining
  document.getElementById('btn-accept-all')?.addEventListener('click', () => {
    const toAdd = state.manuscriptSuggestions.filter((_,i) => !state.acceptedSuggestions.has(i));
    const newEntities = toAdd.map(s => ({
      id:uid(), type:s.type, name:s.name, description:s.description,
      fields:{}, tags:s.tags||[], notes:'', updatedAt:Date.now(), createdAt:Date.now(),
    }));
    state.entities = [...state.entities, ...newEntities];
    save(LS.entities, state.entities);
    state.manuscriptSuggestions.forEach((_,i) => state.acceptedSuggestions.add(i));
    render();
  });

  // Manuscript suggestions — accept / dismiss
  document.querySelectorAll('[data-accept]').forEach(el => {
    el.addEventListener('click', () => {
      const i = parseInt(el.dataset.accept);
      const s = state.manuscriptSuggestions[i];
      const entity = { id:uid(), type:s.type, name:s.name, description:s.description, fields:{}, tags:s.tags||[], notes:'', updatedAt:Date.now(), createdAt:Date.now() };
      state.entities = [...state.entities, entity];
      save(LS.entities, state.entities);
      state.acceptedSuggestions.add(i);
      render();
    });
  });
  document.querySelectorAll('[data-dismiss]').forEach(el => {
    el.addEventListener('click', () => { state.acceptedSuggestions.add(parseInt(el.dataset.dismiss)); render(); });
  });

  // Install banner
  document.getElementById('btn-dismiss-install')?.addEventListener('click', () => { state.showInstallBanner=false; render(); });

  // Scroll chat to bottom
  const chatMsgs = document.getElementById('chat-messages');
  if (chatMsgs) chatMsgs.scrollTop = chatMsgs.scrollHeight;
}

// ── AI Helpers ───────────────────────────────────────────────
function worldContext() {
  return state.entities.map(e => {
    const t = typeMeta(e.type);
    const fieldStr = Object.entries(e.fields||{}).map(([k,v])=>`  ${k}: ${v}`).join('\n');
    return `[${t.label.toUpperCase()}] ${e.name}\n${e.description||''}\n${fieldStr}`;
  }).join('\n\n');
}

function currentKey() {
  return state.provider==='claude' ? state.claudeKey : state.openaiKey;
}

async function callAI({ system, userContent, maxTokens=1000 }) {
  const key = currentKey();
  if (!key) throw new Error('No API key set');

  if (state.provider==='claude') {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true',
      },
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens: maxTokens,
        system,
        messages:[{ role:'user', content: userContent }],
      }),
    });
    const json = await resp.json();
    if (json.error) throw new Error(json.error.message);
    return json.content?.map(b=>b.text||'').join('')||'';
  } else {
    const messages = [];
    if (system) messages.push({ role:'system', content: system });
    messages.push({ role:'user', content: userContent });
    const resp = await fetch('https://api.openai.com/v1/chat/completions', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${key}` },
      body: JSON.stringify({ model:'gpt-4o', max_tokens: maxTokens, messages }),
    });
    const json = await resp.json();
    if (json.error) throw new Error(json.error.message);
    return json.choices?.[0]?.message?.content||'';
  }
}

async function callAIChat({ system, messages, maxTokens=1000 }) {
  const key = currentKey();
  if (!key) throw new Error('No API key set');

  if (state.provider==='claude') {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true',
      },
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:maxTokens, system, messages }),
    });
    const json = await resp.json();
    if (json.error) throw new Error(json.error.message);
    return json.content?.map(b=>b.text||'').join('')||'';
  } else {
    const allMsgs = system ? [{ role:'system', content:system }, ...messages] : messages;
    const resp = await fetch('https://api.openai.com/v1/chat/completions', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${key}` },
      body: JSON.stringify({ model:'gpt-4o', max_tokens:maxTokens, messages: allMsgs }),
    });
    const json = await resp.json();
    if (json.error) throw new Error(json.error.message);
    return json.choices?.[0]?.message?.content||'';
  }
}

// ── Chat ─────────────────────────────────────────────────────
async function sendChat(text) {
  const chatInput = document.getElementById('chat-input');
  const msg = (text || chatInput?.value || '').trim();
  if (!msg || state.chatLoading || !isOnline()) return;
  if (chatInput) chatInput.value = '';

  if (!currentKey()) {
    state.chat.push({ role:'assistant', content:'Please enter your API key above to use the Lore Oracle.' });
    save(LS.chat, state.chat); render(); return;
  }

  state.chat.push({ role:'user', content:msg });
  state.chatLoading = true;
  render();

  const system = `You are WorldForge, an expert creative collaborator and worldbuilding assistant for a fantasy series. You have deep knowledge of the author's world based on the story bible below. Help with: answering lore questions, generating new ideas consistent with existing lore, checking consistency, drafting scene snippets, and suggesting plot directions. Be specific, creative, and reference existing world details when relevant. Keep responses focused and useful. Speak with gravitas befitting a fantasy world.

=== STORY BIBLE ===
${worldContext() || '(No entries yet — help the author start building their world!)'}
=== END BIBLE ===`;

  try {
    const reply = await callAIChat({ system, messages: state.chat.map(m=>({role:m.role,content:m.content})) });
    state.chat.push({ role:'assistant', content:reply });
  } catch(err) {
    state.chat.push({ role:'assistant', content:`⚠️ Error: ${err.message}` });
  }
  state.chatLoading=false;
  save(LS.chat, state.chat.slice(-60));
  render();
}

async function runConsistencyCheck() {
  if (!isOnline()) { alert('Consistency check requires an internet connection.'); return; }
  if (!currentKey()) { state.nav='chat'; render(); return; }
  if (state.entities.length < 2) return;
  state.consistencyLoading=true; state.consistencyReport=null; render();

  try {
    const raw = await callAI({
      system: `You are a meticulous fantasy editor and continuity specialist. Analyse the story bible and identify potential inconsistencies, contradictions, plot holes, or logical tensions. Return ONLY a valid JSON array of objects with keys: title (string), description (string), severity ("high"|"medium"|"low"), entities (array of names). No markdown, no fences, just raw JSON.`,
      userContent: worldContext(),
      maxTokens: 1500,
    });

  }
  state.consistencyLoading=false; render();
}

// ── Manuscript Analysis (chunked, timeout-safe, resume-capable) ──
const CHUNK_SIZE = 12000;
const CHUNK_TIMEOUT_MS = 55000; // 55 second timeout per chunk
const LS_MANUSCRIPT_PROGRESS = 'worldforge_manuscript_progress';

function chunkText(text, size) {
  const chunks = [];
  const paragraphs = text.split(/\n\s*\n/);
  let current = '';
  for (const para of paragraphs) {
    if ((current + para).length > size && current.length > 0) {
      chunks.push(current.trim());
      current = para;
    } else {
      current += (current ? '\n\n' : '') + para;
    }
  }
  if (current.trim()) chunks.push(current.trim());
  const result = [];
  for (const c of chunks) {
    if (c.length > size) {
      for (let i=0; i<c.length; i+=size) result.push(c.slice(i, i+size));
    } else {
      result.push(c);
    }
  }
  return result;
}

function deduplicateSuggestions(suggestions) {
  const seen = new Set();
  return suggestions.filter(s => {
    const key = (s.name||'').toLowerCase().trim();
    if (!key || seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

// Try to repair truncated JSON by finding the last complete object
function repairJson(raw) {
  const cleaned = raw.replace(/```json|```/g, '').trim();
  // First try parsing as-is
  try { return JSON.parse(cleaned); } catch {}
  // Find the last complete object by looking for the last },  or }]
  const lastClose = cleaned.lastIndexOf('},');
  const lastCloseEnd = cleaned.lastIndexOf('}]');
  const cutAt = Math.max(lastClose, lastCloseEnd);
  if (cutAt > 0) {
    const candidate = cleaned.slice(0, cutAt + 1) + ']';
    try { return JSON.parse(candidate); } catch {}
  }
  // Try to find array start and salvage whatever complete objects exist
  const start = cleaned.indexOf('[');
  if (start >= 0) {
    // Walk through and collect complete objects
    const results = [];
    let depth = 0, inStr = false, escape = false, objStart = -1;
    for (let i = start + 1; i < cleaned.length; i++) {
      const ch = cleaned[i];
      if (escape) { escape = false; continue; }
      if (ch === '\\') { escape = true; continue; }
      if (ch === '"' && !escape) { inStr = !inStr; continue; }
      if (inStr) continue;
      if (ch === '{') { if (depth === 0) objStart = i; depth++; }
      else if (ch === '}') {
        depth--;
        if (depth === 0 && objStart >= 0) {
          try { results.push(JSON.parse(cleaned.slice(objStart, i+1))); } catch {}
          objStart = -1;
        }
      }
    }
    if (results.length > 0) return results;
  }
  return [];
}

// Wraps a promise with a timeout
function withTimeout(promise, ms, label) {
  return new Promise((resolve, reject) => {
    const timer = setTimeout(() => reject(new Error(`Timeout after ${ms/1000}s`)), ms);
    promise.then(v => { clearTimeout(timer); resolve(v); })
           .catch(e => { clearTimeout(timer); reject(e); });
  });
}

async function handleFile(file) {
  if (!file) return;
  if (!isOnline()) { alert('Manuscript analysis requires an internet connection.'); return; }
  const key = currentKey();
  if (!key) { state.nav='chat'; render(); return; }

  const text = await file.text();
  const chunks = chunkText(text, CHUNK_SIZE);

  // Check for saved progress from a previous interrupted run
  let startFrom = 0;
  let allSuggestions = [];
  const saved = localStorage.getItem(LS_MANUSCRIPT_PROGRESS);
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      // Only resume if chunk count matches (same file)
      if (parsed.chunksTotal === chunks.length && parsed.chunksDone > 0) {
        const resume = confirm(
          `A previous import was interrupted at section ${parsed.chunksDone} of ${parsed.chunksTotal}.\n\nResume from where it left off?`
        );
        if (resume) {
          startFrom = parsed.chunksDone;
          allSuggestions = parsed.suggestions || [];
        }
      }
    } catch {}
  }

  state.manuscriptLoading = true;
  state.manuscriptSuggestions = null;
  state.acceptedSuggestions = new Set();
  state.manuscriptProgress = { chunksDone: startFrom, chunksTotal: chunks.length };
  render();

  const system = `You are a fantasy story bible builder. Analyse this section of a manuscript and extract distinct worldbuilding elements. For each element determine its type: char (named characters), faction (organisations/groups/factions), location (named places), magic (magic systems/powers/artifacts), history (historical events/lore). Return ONLY a valid JSON array of objects with keys: name (string), type ("char"|"faction"|"location"|"magic"|"history"), description (2-3 sentence summary based only on what this text establishes), tags (array of 2-4 short descriptors). Only include elements with enough detail to be worth a bible entry. No markdown, no fences, raw JSON array only.`;

  let errorCount = 0;
  let timeoutCount = 0;

  for (let i = startFrom; i < chunks.length; i++) {
    try {
      const raw = await withTimeout(
        callAI({
          system,
          userContent: `Manuscript section ${i+1} of ${chunks.length}:\n\n${chunks[i]}`,
          maxTokens: 2000,
        }),
        CHUNK_TIMEOUT_MS,
        `chunk ${i+1}`
      );
      const parsed = repairJson(raw);
      if (Array.isArray(parsed)) allSuggestions.push(...parsed);
    } catch(err) {
      if (err.message.includes('Timeout')) {
        timeoutCount++;
        console.warn(`Chunk ${i+1} timed out — skipping`);
      } else {
        errorCount++;
        console.warn(`Chunk ${i+1} failed:`, err.message);
      }
    }

    // Save progress after every chunk so we can resume if interrupted
    state.manuscriptProgress = { chunksDone: i+1, chunksTotal: chunks.length };
    localStorage.setItem(LS_MANUSCRIPT_PROGRESS, JSON.stringify({
      chunksDone: i+1,
      chunksTotal: chunks.length,
      suggestions: allSuggestions,
    }));
    render();
  }

  // All done — clear saved progress and show results
  localStorage.removeItem(LS_MANUSCRIPT_PROGRESS);
  state.manuscriptSuggestions = deduplicateSuggestions(allSuggestions);
  state.manuscriptLoading = false;

  if (allSuggestions.length === 0) {
    alert('No entries could be extracted. Check your API key and try again.');
  } else if (timeoutCount > 0 || errorCount > 0) {
    console.info(`Import complete. ${timeoutCount} chunks timed out, ${errorCount} had errors. ${allSuggestions.length} suggestions found.`);
  }
  render();
}

// ── Utility ──────────────────────────────────────────────────
function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
